[build]
  command = "python3 scripts/build_publications.py && hugo --gc --minify -b $URL"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.164.0"

[context.deploy-preview]
  command = "python3 scripts/build_publications.py && hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "python3 scripts/build_publications.py && hugo --gc --minify -b $DEPLOY_PRIME_URL"
